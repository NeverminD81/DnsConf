name: Update GeoHide Clean Hosts

on:
  schedule:
    - cron: "0 */6 * * *"   # обновление каждые 6 часов
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Download GeoHideDNS
        run: |
          curl -s https://raw.githubusercontent.com/Internet-Helper/GeoHideDNS/main/hosts/hosts > raw_hosts.txt

      - name: Clean and convert
        run: |
          sed 's/#.*$//' raw_hosts.txt | \
          sed 's/:443//g' | \
          sed 's/:80//g' | \
          sed 's/=.*//g' | \
          sed 's/\*\.//g' | \
          grep -E '^[a-z0-9.-]+\s+[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | \
          grep -vE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+\s+[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | \
          grep -vE '^localhost' | \
          grep -vE '^0\.0\.0\.0' | \
          sort -u > geohide-clean-hosts.txt

      - name: Upload to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          curl -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"files\": {\"geohide-clean-hosts.txt\": {\"content\": \"$(sed 's/\"/\\\"/g' geohide-clean-hosts.txt)\"}}}" \
            https://api.github.com/gists/e66f78b36faf1c9951b3c4c8edfefa57
