name: Update GeoHide Clean Hosts

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Download GeoHideDNS
        run: |
          curl -s https://raw.githubusercontent.com/Internet-Helper/GeoHideDNS/main/hosts/hosts > raw_hosts.txt

      - name: Clean and convert
        run: |
          grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' raw_hosts.txt | \
          awk '{print $2}' | \
          grep -E '^[a-z0-9.-]+$' | \
          grep -vE '^localhost$' | \
          grep -vE '^local$' | \
          sort -u > geohide-clean-hosts.txt

      - name: Upload to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          CONTENT=$(sed 's/"/\\"/g' geohide-clean-hosts.txt)
          curl -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"files\": {\"geohide-clean-hosts.txt\": {\"content\": \"$CONTENT\"}}}" \
            https://api.github.com/gists/e66f78b36faf1c9951b3c4c8edfefa57
